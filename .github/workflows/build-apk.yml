name: Build CineHD TV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Install Gradle 8.2 directly (no wrapper JAR needed)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # 4. Set up Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Accept Android licenses
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # 6. Install required SDK components
      - name: Install SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 7. Build the debug APK
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # 8. Upload APK as downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CineHD-TV-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build success summary
        run: echo "✅ APK ready — download from Actions → this run → Artifacts"
